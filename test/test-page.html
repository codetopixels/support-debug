<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Support Debug Report — test page</title>
</head>
<body>
<h1>Support Debug Report — test page</h1>
<p>Click the buttons to generate one of each kind of error, then click the
extension icon and confirm they all appear in the copied report.</p>

<button onclick="console.error('test console.error', {code: 42})">console.error</button>
<button onclick="console.warn('test console.warn')">console.warn</button>
<button onclick="undefinedFunctionCall()">uncaught error</button>
<button onclick="Promise.reject(new Error('test rejection'))">unhandled rejection</button>
<button onclick="fetch('https://httpstat.us/500')">fetch 500</button>
<button onclick="fetch('https://this-host-does-not-exist.invalid/')">fetch network failure</button>
<button onclick="xhrFail()">XHR failure</button>
<button onclick="brokenImage()">broken image</button>

<script>
function xhrFail() {
  const xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://this-host-does-not-exist.invalid/xhr');
  xhr.send();
}
function brokenImage() {
  const img = document.createElement('img');
  img.src = 'https://this-host-does-not-exist.invalid/missing.png';
  document.body.appendChild(img);
}
</script>
</body>
</html>
